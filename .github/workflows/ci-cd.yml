---
name: CI

on:
  push:
    branches:
      - main
      - '[0-9].[0-9]+'  # matches to backport branches, e.g. 3.6
    tags: [ 'v*' ]
  pull_request:
    branches:
      - main
      - '[0-9].[0-9]+'


# Restrict the default GITHUB_TOKEN to read-only. Jobs that need more (deploy)
# request elevated scopes explicitly, which overrides this for that job only.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes. Only PR runs are
# cancelled; pushes to main and tags (which trigger deploy) always run to
# completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Python
      # important: do not use system python
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: '3.12'
        activate-environment: true
        enable-cache: true
    - name: Install dependencies
      run: uv pip install -r requirements/dev.txt
    - name: Install itself
      run: uv pip install .
    - name: Prepare twine checker
      run: |
        uv pip install -U build twine wheel
        python -m build
    - name: Run twine checker
      run: |
        twine check dist/*

  test:
    name: Test
    strategy:
      matrix:
        pyver: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu, macos, windows]
        include:
          - pyver: pypy-3.10
            os: ubuntu
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Python ${{ matrix.pyver }}
      # important: do not use system python
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.pyver }}
        activate-environment: true
        enable-cache: true
    - name: Install dependencies
      run: uv pip install -r requirements/dev.txt
    - name: Install itself
      run: uv pip install .
    - name: Run unittests
      run: python -m pytest
      env:
        COLOR: 'yes'
    - run: python -m coverage xml
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  check:  # This job does nothing and is only used for the branch protection
    if: always()

    needs: [lint, test]
    timeout-minutes: 20

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}

  deploy:
    name: Deploy
    environment: pypi
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    permissions:
      contents: write  # GitHub Releases
      id-token: write  # Trusted publishing & sigstore
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Python
      # important: do not use system python
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: '3.12'
        activate-environment: true
        enable-cache: true
    - name: Install dependencies
      run: uv pip install -U pip wheel setuptools build twine
    - name: Build dists
      run: |
        python -m build
    - name: Make Release
      uses: aio-libs/create-release@v1.6.6
      with:
        changes_file: CHANGES.rst
        name: aiohttp-asyncmdnsresolver
        version_file: src/aiohttp_asyncmdnsresolver/__init__.py
        github_token: ${{ secrets.GITHUB_TOKEN }}
        dist_dir: dist
        head_line: >-
          v{version}\n=+\n\n\*\({date}\)\*\n
        fix_issue_regex: "`#(\\d+) <https://github.com/aio-libs/aiohttp-asyncmdnsresolver/issues/\\1>`"
        fix_issue_repl: "(#\\1)"
    - name: >-
        Publish 🐍📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
